<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skillarly Mobile</title>
  <link rel="icon" href="logo.png" type="image/x-icon" />

  
  <link rel="apple-touch-icon" sizes="57x57" href="images/apple-icon-57x57.png">
  <link rel="apple-touch-icon" sizes="60x60" href="images/apple-icon-60x60.png">
  <link rel="apple-touch-icon" sizes="72x72" href="images/apple-icon-72x72.png">
  <link rel="apple-touch-icon" sizes="76x76" href="images/apple-icon-76x76.png">
  <link rel="apple-touch-icon" sizes="114x114" href="images/apple-icon-114x114.png">
  <link rel="apple-touch-icon" sizes="120x120" href="images/apple-icon-120x120.png">
  <link rel="apple-touch-icon" sizes="144x144" href="images/apple-icon-144x144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="images/apple-icon-152x152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="images/apple-icon-180x180.png">
  <link rel="icon" type="image/png" sizes="192x192"  href="images/android-icon-192x192.png">
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96x96.png">
  <link rel="icon" type="image/png" sizes="16x16" href="images/favicon-16x16.png">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Analyzing your LinkedIn profile...</h1>
    <p id="status">Hang tight! We're analyzing your profile...</p>
  </div>

  <script>
    const referrer = document.referrer;

    if (!referrer.includes("linkedin.com/in")) {
      document.getElementById("status").innerText = "Error: This must be opened from your LinkedIn profile.";
    } else {
      fetch("/scrape-profile", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ profileUrl: referrer })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.href = `/dashboard.html?email=${encodeURIComponent(data.email)}`;
        } else {
          document.getElementById("status").innerText = "Failed to analyze your profile.";
        }
      });
    }
  </script>
</body>
</html>
